name: Build Release APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | sed '/^--/d' | base64 -d > nutrisnap-release.jks

      - name: Create google-services.json
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | sed '/^--/d' | base64 -d > app/google-services.json

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "nutrisnap.storeFile=nutrisnap-release.jks" >> local.properties
          echo "nutrisnap.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "nutrisnap.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "nutrisnap.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Read version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed -n 's/.*versionName = "\(.*\)"/\1/p')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed -n 's/.*versionCode = \(.*\)/\1/p')
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}+${{ github.run_number }}
          name: v${{ steps.version.outputs.version_name }} (build ${{ github.run_number }})
          body: |
            ## NutriSnap v${{ steps.version.outputs.version_name }}

            **Version code:** ${{ steps.version.outputs.version_code }}
            **Commit:** ${{ github.sha }}

            ### Assets
            - `app-release.apk` — signed release APK
            - `app-release.aab` — signed Android App Bundle
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
