name: Build Release APK & AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore
        run: printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d -i > nutrisnap-release.jks

      - name: Create google-services.json
        run: printf '%s' "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 -d -i > app/google-services.json

      - name: Validate google-services.json
        run: python3 -c "import json,sys; json.load(open('app/google-services.json')); print('OK')"

      - name: Create local.properties
        env:
          GH_PROXY_URL: ${{ secrets.GH_PROXY_URL }}
          GH_PROXY_SECRET: ${{ secrets.GH_PROXY_SECRET }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
        run: |
          echo "sdk.dir=$ANDROID_HOME" >> local.properties
          echo "nutrisnap.storeFile=nutrisnap-release.jks" >> local.properties
          echo "nutrisnap.storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> local.properties
          echo "nutrisnap.keyAlias=${{ secrets.KEY_ALIAS }}" >> local.properties
          echo "nutrisnap.keyPassword=${{ secrets.KEY_PASSWORD }}" >> local.properties
          echo "github.proxy.url=$GH_PROXY_URL" >> local.properties
          echo "github.proxy.secret=$GH_PROXY_SECRET" >> local.properties
          echo "admob.app.id=$ADMOB_APP_ID" >> local.properties
          echo "admob.banner.id=$ADMOB_BANNER_ID" >> local.properties
          echo "admob.interstitial.id=$ADMOB_INTERSTITIAL_ID" >> local.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build release APK and AAB
        run: ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Read version info
        id: version
        run: |
          # Read the actual *resolved* values Gradle used (from the generated BuildConfig),
          # not the source expression — grepping app/build.gradle.kts silently breaks whenever
          # versionName/versionCode stop being simple string/int literals (e.g. env var
          # fallbacks), producing a blank release tag instead of a build failure.
          BUILD_CONFIG="app/build/generated/source/buildConfig/release/com/charles/nutrisnap/BuildConfig.java"
          VERSION_NAME=$(sed -n 's/.*VERSION_NAME = "\(.*\)";/\1/p' "$BUILD_CONFIG")
          VERSION_CODE=$(sed -n 's/.*VERSION_CODE = \(.*\);/\1/p' "$BUILD_CONFIG")
          if [ -z "$VERSION_NAME" ] || [ -z "$VERSION_CODE" ]; then
            echo "Could not read version info from $BUILD_CONFIG" >&2
            exit 1
          fi
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}+${{ github.run_number }}
          name: v${{ steps.version.outputs.version_name }} (build ${{ github.run_number }})
          body: |
            ## NutriSnap v${{ steps.version.outputs.version_name }}

            **Version code:** ${{ steps.version.outputs.version_code }}
            **Commit:** ${{ github.sha }}

            ### Assets
            - `app-release.apk` — signed release APK
            - `app-release.aab` — signed Android App Bundle
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
